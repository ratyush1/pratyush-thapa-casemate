<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">CaseMate logo</title>
  <desc id="desc">A shield with golden justice scales above the CaseMate wordmark.</desc>
  <defs>
